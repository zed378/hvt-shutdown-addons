apiVersion: harvesterhci.io/v1beta1
kind: Addon
metadata:
  name: netbird
  namespace: harvester-system
spec:
  # Enable to deploy the NetBird agent. Set the domain + setup key on the dashboard
  # "NetBird" page (Advanced) or in valuesContent below.
  enabled: false
  # This chart is served from its own folder on GitHub Pages (its own index.yaml).
  repo: "https://zed378.github.io/hvt-shutdown-addons/netbird"
  version: "0.1.0"
  chart: netbird
  valuesContent: |-
    netbird:
      enabled: true
      name: netbird
      namespace: harvester-system
      image:
        repository: "netbirdio/netbird"
        tag: "latest"
        pullPolicy: "IfNotPresent"
      # Set these on the dashboard NetBird page, or here:
      managementUrl: ""
      setupKey: ""
      resources:
        limits:
          cpu: "200m"
          memory: "128Mi"
        requests:
          cpu: "50m"
          memory: "64Mi"
