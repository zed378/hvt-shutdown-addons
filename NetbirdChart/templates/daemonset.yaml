{{- if and .Values.netbird.enabled .Values.netbird.setupKey .Values.netbird.managementUrl }}
# The agent DaemonSet only deploys once a management URL + setup key are set
# (via the dashboard NetBird page or values). Until then, only the config Secret
# exists, so enabling the add-on with no config doesn't crash-loop pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.netbird.name }}
  namespace: {{ .Values.netbird.namespace }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.netbird.name }}
  namespace: {{ .Values.netbird.namespace }}
  labels:
    app: {{ .Values.netbird.name }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.netbird.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.netbird.name }}
    spec:
      serviceAccountName: {{ .Values.netbird.name }}
      # Node-level VPN: use the host network and let the agent manage a WireGuard
      # interface on each node.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: netbird
          image: "{{ .Values.netbird.image.repository }}:{{ .Values.netbird.image.tag }}"
          imagePullPolicy: {{ .Values.netbird.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.netbird.name }}-config
                  key: setup-key
            - name: NB_MANAGEMENT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.netbird.name }}-config
                  key: management-url
            # Enroll each node under its own name.
            - name: NB_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
{{ toYaml .Values.netbird.resources | nindent 12 }}
          volumeMounts:
            # Persist the peer identity/config so a restart doesn't create a new peer.
            - name: config
              mountPath: /etc/netbird
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        - name: config
          hostPath:
            path: /etc/netbird
            type: DirectoryOrCreate
        - name: tun
          hostPath:
            path: /dev/net/tun
{{- end }}
