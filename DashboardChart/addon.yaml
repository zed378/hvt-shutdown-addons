apiVersion: harvesterhci.io/v1beta1
kind: Addon
metadata:
  name: harvester-dashboard
  namespace: harvester-system
spec:
  # Set to true to install the custom dashboard and switch Harvester's ui-index to it.
  # Disabling restores Harvester's default ui-index/ui-source first, then removes the
  # dashboard — so the UI is never left pointing at a dead URL.
  enabled: false
  # This chart is served from its own folder on GitHub Pages (its own index.yaml),
  # separate from the feature add-ons published at the repo root.
  repo: "https://zed378.github.io/hvt-shutdown-addons/dashboard"
  version: "0.3.1"
  chart: harvester-dashboard
  valuesContent: |-
    namespace: "harvester-system"
    hookImage: "zed378/hvt-shutdown:latest"
    hookImagePullPolicy: "Always"

    uiDashboard:
      enabled: true
      name: harvester-dashboard
      replicas: 1
      manageUiIndex: true
      image:
        registry: "zed378"
        repository: "harvester-dashboard"
        tag: "v1.7-node-shutdown"
        pullPolicy: "Always"

      # Browser fetches the assets from https://<harvester>/custom-dashboard/... via
      # Harvester's own nginx ingress => same origin => reuses the cert you already
      # trust => no certificate approval. Baked into the image (Dockerfile.ui
      # ARG ASSET_PATH); rebuild the image if you change it.
      assetPath: "/custom-dashboard"
      internalPort: 8080

      ingress:
        enabled: true
        className: "nginx"
        # Empty = match any host, like Harvester's own host-less rancher-expose.
        host: ""

      updateStrategy:
        maxUnavailable: 0
        maxSurge: 1
      resources:
        limits:
          cpu: "500m"
          memory: "512Mi"
        requests:
          cpu: "100m"
          memory: "128Mi"
