# harvester-dashboard chart — the custom Harvester UI (forked harvester-ui-extension)
# wired in as Harvester's ui-index. Deploy once; feature add-ons (node-shutdown,
# vpn) contribute their own menus into it, each gated on that add-on being
# enabled.
#
# NO TLS / NO CERTIFICATE APPROVAL, by design:
#   * Harvester fetches the ui-index HTML server-side over cluster DNS (plain HTTP).
#   * The browser fetches the JS/CSS through Harvester's OWN nginx ingress on the
#     VIP:443 at `assetPath` — same origin as the Harvester UI, so it reuses the
#     certificate the operator already trusts.

# Namespace the dashboard resources deploy into.
namespace: "harvester-system"

# Image for the ui-index set/restore hook Jobs. Needs to run `python` with the
# kubernetes client — the node-shutdown API image bundles it. Override to any such
# image if you deploy the dashboard without node-shutdown.
hookImage: "zed378/hvt-shutdown:latest"
hookImagePullPolicy: "IfNotPresent"

uiDashboard:
  enabled: true
  name: harvester-dashboard
  replicas: 1

  # Auto-set Harvester ui-index/ui-source on enable, restore them on disable.
  manageUiIndex: true

  image:
    registry: "zed378"
    repository: "harvester-dashboard"
    tag: "v1.7-node-shutdown"
    pullPolicy: "IfNotPresent"

  # Where the browser fetches the dashboard's JS/CSS from, served through
  # Harvester's own ingress => same origin => no separate cert.
  # IMPORTANT: this is baked into the image at build time (Dockerfile.ui ARG
  # ASSET_PATH). If you change it here you must rebuild the image with the same
  # value. It must not collide with Harvester/Rancher paths (/dashboard, /v1, /v3,
  # /k8s, /api, /apis).
  assetPath: "/custom-dashboard"

  # Cluster-internal HTTP port (ClusterIP service + container). Used by Harvester's
  # server-side ui-index fetch and as the Ingress backend. Never exposed directly.
  internalPort: 8080

  ingress:
    enabled: true
    # RKE2/Harvester ships the nginx ingress controller; its LoadBalancer
    # (kube-system/ingress-expose) is what serves https://<VIP>:443.
    className: "nginx"
    # Leave empty to match any host, exactly like Harvester's own host-less
    # `rancher-expose` ingress. Our path is more specific than its "/", so it wins.
    host: ""

  updateStrategy:
    maxUnavailable: 0
    maxSurge: 1

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
