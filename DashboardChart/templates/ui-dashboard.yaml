{{- if .Values.uiDashboard.enabled }}
# Custom Harvester dashboard, served as Harvester's ui-index.
#
# No TLS anywhere in here — by design:
#   * Harvester fetches the ui-index HTML server-side over cluster DNS (plain HTTP).
#   * The browser fetches the JS/CSS through Harvester's OWN nginx ingress on the
#     VIP:443 at .Values.uiDashboard.assetPath, so they are SAME-ORIGIN with the
#     Harvester UI and reuse the certificate the operator already trusts.
# => no self-signed cert, no VIP baked in, no certificate approval.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.uiDashboard.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.uiDashboard.name }}
spec:
  replicas: {{ .Values.uiDashboard.replicas | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.uiDashboard.updateStrategy.maxUnavailable }}
      maxSurge: {{ .Values.uiDashboard.updateStrategy.maxSurge }}
  selector:
    matchLabels:
      app: {{ .Values.uiDashboard.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.uiDashboard.name }}
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.uiDashboard.image.registry }}/{{ .Values.uiDashboard.image.repository }}:{{ .Values.uiDashboard.image.tag }}"
          imagePullPolicy: {{ .Values.uiDashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
{{ toYaml .Values.uiDashboard.resources | nindent 12 }}
          # The image runs nginx as uid 101 with everything pre-owned, so it never
          # needs CAP_CHOWN at startup and no root is required (port 8080).
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
# ClusterIP service. Used by BOTH:
#   * Harvester's server-side ui-index fetch (via cluster DNS), and
#   * the Ingress below (browser asset requests).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.uiDashboard.name }}-internal
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.uiDashboard.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.uiDashboard.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.uiDashboard.internalPort }}
      targetPort: 8080
      name: http
{{- if .Values.uiDashboard.ingress.enabled }}
---
# Serve the dashboard assets from Harvester's own origin (the nginx ingress on the
# VIP:443, same controller that serves the Harvester UI itself). This is what makes
# the assets same-origin => existing cert => no approval prompt.
# The path is more specific than Harvester's own "/" rule, so it wins.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.uiDashboard.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.uiDashboard.name }}
spec:
  ingressClassName: {{ .Values.uiDashboard.ingress.className | quote }}
  rules:
    -
      {{- if .Values.uiDashboard.ingress.host }}
      host: {{ .Values.uiDashboard.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ .Values.uiDashboard.assetPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.uiDashboard.name }}-internal
                port:
                  number: {{ .Values.uiDashboard.internalPort }}
{{- end }}
{{- end }}
