{{- if and .Values.uiDashboard.enabled .Values.uiDashboard.tls.copyFrom.name (not .Values.uiDashboard.tls.secretName) }}
{{- /*
  Copy Harvester's serving cert (e.g. cattle-system/serving-cert) into this
  namespace so the dashboard container can serve the SAME cert your browser
  already trusts for https://<VIP>. Uses Helm lookup, so it re-syncs on each
  upgrade (dynamiclistener rotates the cert roughly yearly). Requires the
  install to have get access to the source Secret; if the lookup returns
  nothing (dry-run or no RBAC), no Secret is written and the container falls
  back to self-signing from VIP.
*/ -}}
{{- $src := lookup "v1" "Secret" .Values.uiDashboard.tls.copyFrom.namespace .Values.uiDashboard.tls.copyFrom.name }}
{{- if and $src $src.data (index $src.data "tls.crt") (index $src.data "tls.key") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.uiDashboard.name }}-tls
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.uiDashboard.name }}
  annotations:
    node-shutdown/copied-from: "{{ .Values.uiDashboard.tls.copyFrom.namespace }}/{{ .Values.uiDashboard.tls.copyFrom.name }}"
type: kubernetes.io/tls
data:
  tls.crt: {{ index $src.data "tls.crt" }}
  tls.key: {{ index $src.data "tls.key" }}
{{- end }}
{{- end }}
