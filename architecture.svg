<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 600" width="100%" height="100%" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    
    <!-- Drop shadow for main elements -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.05" />
    </filter>
  </defs>

  <!-- Background / Main Cluster -->
  <rect x="20" y="20" width="810" height="560" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  <text x="50" y="55" font-size="18" font-weight="700" fill="#334155">Harvester Cluster</text>

  <!-- harvester-system Namespace -->
  <rect x="40" y="80" width="770" height="260" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2" />
  <text x="60" y="110" font-size="14" font-weight="600" fill="#166534">harvester-system Namespace</text>

  <!-- Addon CRD -->
  <rect x="60" y="140" width="220" height="90" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="2" filter="url(#shadow)" />
  <text x="170" y="165" font-size="14" font-weight="600" fill="#3730a3" text-anchor="middle">Addon CRD</text>
  <text x="170" y="185" font-size="12" fill="#4f46e5" text-anchor="middle">harvesterhci.io/v1beta1</text>
  <text x="170" y="205" font-size="12" fill="#4f46e5" text-anchor="middle">enabled / disabled toggle</text>

  <!-- DaemonSet -->
  <rect x="340" y="120" width="450" height="200" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="2" filter="url(#shadow)" />
  <text x="360" y="145" font-size="14" font-weight="600" fill="#9a3412">DaemonSet: node-shutdown-webhook</text>

  <!-- API Endpoints -->
  <rect x="360" y="165" width="200" height="90" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <text x="460" y="185" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">API Endpoints</text>
  <text x="460" y="205" font-size="11" fill="#475569" text-anchor="middle">POST /system/shutdown</text>
  <text x="460" y="222" font-size="11" fill="#475569" text-anchor="middle">GET /healthz /ready /k8s</text>

  <!-- K8s Client -->
  <rect x="575" y="165" width="195" height="90" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <text x="672" y="185" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">K8s API Client</text>
  <text x="672" y="205" font-size="11" fill="#475569" text-anchor="middle">- List pods</text>
  <text x="672" y="222" font-size="11" fill="#475569" text-anchor="middle">- Delete virt-launchers</text>

  <!-- FastAPI Container -->
  <rect x="360" y="270" width="410" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <text x="565" y="292" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">FastAPI Container (port 8080, uvicorn)</text>

  <!-- Physical Nodes -->
  <rect x="40" y="370" width="770" height="190" rx="12" fill="#fefce8" stroke="#fde047" stroke-width="2" />
  <text x="60" y="400" font-size="14" font-weight="600" fill="#854d0e">Physical Nodes</text>

  <!-- Node A -->
  <rect x="130" y="420" width="250" height="110" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)" />
  <text x="255" y="445" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">Node A</text>
  <rect x="150" y="460" width="210" height="25" rx="4" fill="#f1f5f9" />
  <text x="255" y="477" font-size="11" fill="#475569" text-anchor="middle">virt-launcher-vm1</text>
  <rect x="150" y="490" width="210" height="25" rx="4" fill="#f1f5f9" />
  <text x="255" y="507" font-size="11" fill="#475569" text-anchor="middle">virt-launcher-vm2</text>

  <!-- Node B -->
  <rect x="470" y="420" width="250" height="110" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)" />
  <text x="595" y="445" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">Node B</text>
  <rect x="490" y="460" width="210" height="25" rx="4" fill="#f1f5f9" />
  <text x="595" y="477" font-size="11" fill="#475569" text-anchor="middle">virt-launcher-vm3</text>

  <!-- Connections -->
  <!-- CRD to DaemonSet -->
  <path d="M 280 185 L 332 185" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)" />
  <text x="306" y="175" font-size="11" fill="#64748b" text-anchor="middle">Manages</text>

  <!-- API to K8s Client -->
  <path d="M 560 210 L 567 210" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)" />
  
  <!-- DaemonSet to Node A -->
  <path d="M 460 320 L 255 412" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="330" y="380" font-size="12" font-weight="600" fill="#475569" transform="rotate(34, 330, 380)">Shutdown Request</text>

  <!-- DaemonSet to Node B -->
  <path d="M 660 320 L 595 412" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="640" y="380" font-size="12" font-weight="600" fill="#475569" transform="rotate(-54, 640, 380)">Shutdown Request</text>

  <!-- Poweroff self-loops (Node A) -->
  <path d="M 130 475 C 80 475 80 500 122 500" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)" />
  <text x="80" y="460" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">1. Delete VMs</text>
  <text x="80" y="475" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">2. Poweroff</text>

  <!-- Poweroff self-loops (Node B) -->
  <path d="M 720 475 C 770 475 770 500 728 500" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)" />
  <text x="770" y="460" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">1. Delete VMs</text>
  <text x="770" y="475" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">2. Poweroff</text>
</svg>
