<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Solid arrowhead marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <!-- Dashed arrowhead marker -->
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ===== Harvester Cluster (outermost) ===== -->
  <g id="harvester-cluster">
    <rect x="40" y="30" width="720" height="770" rx="16" ry="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <text x="76" y="54" font-size="14" font-weight="bold" fill="#1e293b">Harvester Cluster</text>
  </g>

  <!-- ===== harvester-system Namespace ===== -->
  <g id="namespace">
    <rect x="70" y="60" width="700" height="710" rx="12" ry="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="106" y="82" font-size="13" font-weight="bold" fill="#1e293b">harvester-system Namespace</text>
  </g>

  <!-- ===== Addon CRD (inside Namespace, upper area) ===== -->
  <g id="addon-crd">
    <rect x="100" y="100" width="320" height="60" rx="8" ry="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="110" y="120" font-size="12" font-weight="bold" fill="#1e293b">Addon CRD</text>
    <text x="110" y="138" font-size="11" fill="#475569">harvesterhci.io/v1beta1</text>
    <text x="110" y="154" font-size="11" fill="#475569">enabled/disabled toggle</text>
  </g>

  <!-- ===== DaemonSet (inside Namespace, central area) ===== -->
  <g id="daemonset">
    <rect x="100" y="190" width="320" height="280" rx="10" ry="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="136" y="212" font-size="13" font-weight="bold" fill="#1e293b">DaemonSet: node-shutdown-webhook</text>

    <!-- API Endpoints box -->
    <rect x="125" y="225" width="270" height="80" rx="8" ry="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="135" y="245" font-size="12" font-weight="bold" fill="#1e293b">API Endpoints</text>
    <text x="135" y="263" font-size="11" fill="#475569">POST /system/shutdown</text>
    <text x="135" y="279" font-size="11" fill="#475569">GET /healthz</text>
    <text x="135" y="295" font-size="11" fill="#475569">GET /healthz/ready</text>
    <text x="135" y="311" font-size="11" fill="#475569">GET /healthz/k8s</text>

    <!-- K8s API Client box -->
    <rect x="155" y="325" width="210" height="55" rx="8" ry="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="165" y="345" font-size="12" font-weight="bold" fill="#1e293b">K8s API Client</text>
    <text x="165" y="363" font-size="11" fill="#475569">- List pods</text>
    <text x="165" y="379" font-size="11" fill="#475569">- Delete virt-launchers</text>

    <!-- Connection: API → Client -->
    <path d="M260,305 L260,325" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dashed)"/>
    <text x="266" y="319" font-size="11" fill="#64748b" font-style="italic">calls</text>

    <!-- FastAPI Container box -->
    <rect x="145" y="395" width="230" height="45" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="155" y="412" font-size="12" font-weight="bold" fill="#1e293b">FastAPI Container</text>
    <text x="155" y="428" font-size="11" fill="#475569">port 8080 — uvicorn / fastapi</text>
  </g>

  <!-- Connection: Addon CRD → DaemonSet -->
  <path d="M260,160 L260,190" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dashed)"/>
  <text x="280" y="177" font-size="11" fill="#64748b" font-style="italic">Manages</text>

  <!-- ===== Physical Nodes (inside Namespace, lower area) ===== -->
  <g id="physical-nodes">
    <rect x="100" y="490" width="320" height="240" rx="12" ry="12" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
    <text x="136" y="512" font-size="13" font-weight="bold" fill="#1e293b">Physical Nodes</text>

    <!-- Node A -->
    <rect x="130" y="530" width="140" height="80" rx="8" ry="8" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
    <text x="140" y="550" font-size="12" font-weight="bold" fill="#1e293b">Node A</text>
    <text x="140" y="568" font-size="11" fill="#475569">virt-launcher-vm1</text>
    <text x="140" y="584" font-size="11" fill="#475569">virt-launcher-vm2</text>

    <!-- Node A self-loop -->
    <path d="M200,530 C200,500 260,500 260,530" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="204" y="498" font-size="9" fill="#475569">Shutdown → delete VMs → poweroff</text>

    <!-- Node B -->
    <rect x="290" y="530" width="140" height="80" rx="8" ry="8" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
    <text x="300" y="550" font-size="12" font-weight="bold" fill="#1e293b">Node B</text>
    <text x="300" y="568" font-size="11" fill="#475569">virt-launcher-vm3</text>

    <!-- Node B self-loop -->
    <path d="M360,530 C360,500 420,500 420,530" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="364" y="498" font-size="9" fill="#475569">Shutdown → delete VMs → poweroff</text>
  </g>

  <!-- Connection: DaemonSet → Physical Nodes -->
  <path d="M260,470 L200,530" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M260,470 L360,530" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
