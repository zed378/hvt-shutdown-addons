<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Harvester Cluster (outermost background) -->
  <rect x="20" y="20" width="860" height="560" rx="18" ry="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="48" y="48" font-size="15" font-weight="bold" fill="#111827">Harvester Cluster</text>

  <!-- harvester-system Namespace -->
  <rect x="50" y="55" width="800" height="480" rx="14" ry="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="78" y="80" font-size="13" font-weight="bold" fill="#111827">harvester-system Namespace</text>

  <!-- ==================== TOP ROW ==================== -->
  <!-- Addon CRD (left) -->
  <rect x="80" y="100" width="230" height="100" rx="10" ry="10" fill="#faf5ff" stroke="#a21caf" stroke-width="2"/>
  <text x="96" y="124" font-size="13" font-weight="bold" fill="#111827">Addon CRD</text>
  <text x="96" y="146" font-size="11" fill="#4b5563">harvesterhci.io/v1beta1</text>
  <text x="96" y="164" font-size="11" fill="#4b5563">enabled / disabled toggle</text>

  <!-- DaemonSet (right) -->
  <rect x="330" y="100" width="490" height="330" rx="12" ry="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="362" y="126" font-size="13" font-weight="bold" fill="#111827">DaemonSet: node-shutdown-webhook</text>

  <!-- API Endpoints (inside DaemonSet) -->
  <rect x="355" y="140" width="440" height="90" rx="8" ry="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="368" y="162" font-size="12" font-weight="bold" fill="#111827">API Endpoints</text>
  <text x="368" y="182" font-size="11" fill="#4b5563">POST /system/shutdown</text>
  <text x="368" y="200" font-size="11" fill="#4b5563">GET /healthz</text>
  <text x="368" y="218" font-size="11" fill="#4b5563">GET /healthz/ready</text>
  <text x="368" y="236" font-size="11" fill="#4b5563">GET /healthz/k8s</text>

  <!-- K8s API Client (inside DaemonSet) -->
  <rect x="380" y="255" width="415" height="55" rx="8" ry="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="392" y="277" font-size="12" font-weight="bold" fill="#111827">K8s API Client</text>
  <text x="392" y="297" font-size="11" fill="#4b5563">- List pods</text>
  <text x="392" y="315" font-size="11" fill="#4b5563">- Delete virt-launchers</text>

  <!-- FastAPI row (inside DaemonSet, bottom strip) -->
  <rect x="365" y="330" width="445" height="35" rx="6" ry="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="378" y="352" font-size="11" font-weight="bold" fill="#111827">FastAPI Container — port 8080, uvicorn / fastapi</text>

  <!-- ==================== BOTTOM ROW ==================== -->
  <!-- Physical Nodes header -->
  <text x="96" y="450" font-size="13" font-weight="bold" fill="#111827">Physical Nodes</text>
  <rect x="80" y="458" width="720" height="4" rx="2" ry="2" fill="#ea580c" opacity="0.3"/>

  <!-- Node A -->
  <rect x="110" y="475" width="280" height="60" rx="8" ry="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="124" y="498" font-size="12" font-weight="bold" fill="#111827">Node A</text>
  <text x="124" y="518" font-size="11" fill="#4b5563">virt-launcher-vm1 · virt-launcher-vm2</text>

  <!-- Node A self-loop -->
  <path d="M160,475 C160,455 240,455 240,475" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="166" y="450" font-size="9" fill="#6b7280">Shutdown → delete VMs → poweroff</text>

  <!-- Node B -->
  <rect x="410" y="475" width="280" height="60" rx="8" ry="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="424" y="498" font-size="12" font-weight="bold" fill="#111827">Node B</text>
  <text x="424" y="518" font-size="11" fill="#4b5563">virt-launcher-vm3</text>

  <!-- Node B self-loop -->
  <path d="M460,475 C460,455 540,455 540,475" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="466" y="450" font-size="9" fill="#6b7280">Shutdown → delete VMs → poweroff</text>

  <!-- ==================== CONNECTIONS (drawn last, on top) ==================== -->

  <!-- Addon CRD → DaemonSet (dashed, "Manages") -->
  <path d="M310,150 L330,150" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dashed)"/>
  <text x="320" y="143" font-size="10" fill="#9ca3af" font-style="italic">Manages</text>

  <!-- API → Client (dashed, "calls") -->
  <path d="M575,230 L575,255" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dashed)"/>
  <text x="582" y="248" font-size="10" fill="#9ca3af" font-style="italic">calls</text>

  <!-- DaemonSet → Node A (solid) -->
  <path d="M575,430 L280,475" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DaemonSet → Node B (solid) -->
  <path d="M575,430 L500,475" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
