apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Values.rbac.serviceAccountNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.clusterRoleName }}
rules:
{{- toYaml .Values.rbac.rules | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.rbac.clusterRoleBindingName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Values.rbac.serviceAccountNamespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.rbac.clusterRoleName }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.daemonset.name }}
  namespace: {{ .Values.daemonset.namespace }}
  labels:
    {{- range $key, $value := .Values.daemonset.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- range $key, $value := .Values.daemonset.labels }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- range $key, $value := .Values.daemonset.labels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      annotations:
        {{- if .Values.auditLogging.enabled }}
        audit.logging/enabled: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      terminationGracePeriodSeconds: {{ .Values.daemonset.terminationGracePeriodSeconds }}
      hostNetwork: {{ .Values.daemonset.hostNetwork }}
      hostIPC: {{ .Values.daemonset.hostIPC }}
      hostPID: {{ .Values.daemonset.hostPID }}
      containers:
        - name: webhook
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: {{ .Values.daemonset.privileged }}
            allowPrivilegeEscalation: {{ .Values.podSecurity.allowPrivilegeEscalation }}
            {{- if .Values.daemonset.privileged }}
            runAsUser: 0
            runAsGroup: 0
            {{- end }}
          startupProbe:
            httpGet:
              path: {{ .Values.healthCheck.startup.path }}
              port: {{ .Values.healthCheck.startup.port }}
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.healthCheck.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.startup.periodSeconds }}
            failureThreshold: {{ .Values.healthCheck.startup.failureThreshold }}
            successThreshold: {{ .Values.healthCheck.startup.successThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.liveness.path }}
              port: {{ .Values.healthCheck.liveness.port }}
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readiness.path }}
              port: {{ .Values.healthCheck.readiness.port }}
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readiness.failureThreshold }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GRACE_PERIOD_SECONDS
              value: "{{ .Values.gracePeriodSeconds }}"
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.key }}
            # Live-reload source: the token is read from this mounted Secret file
            # per-request, so rotating it (e.g. via the token console) applies
            # within ~1 minute without restarting the DaemonSet.
            - name: AUTH_TOKEN_FILE
              value: "/etc/auth/{{ .Values.secret.key }}"
            - name: AUDIT_ENABLED
              value: "{{ .Values.auditLogging.enabled }}"
            - name: AUDIT_LOG_PATH
              value: "{{ .Values.auditLogging.path }}"
            - name: MAX_REQUESTS_PER_MINUTE
              value: "{{ .Values.rateLimiting.maxRequestsPerMinute }}"
            - name: VM_SHUTDOWN_TIMEOUT
              value: "{{ .Values.vmShutdownTimeout }}"
            - name: NODE_PORT
              value: "{{ .Values.nodePort.nodePort }}"
            - name: LISTEN_PORT
              value: "{{ .Values.nodePort.targetPort }}"
            {{- if .Values.tls.enabled }}
            - name: TLS_ENABLED
              value: "true"
            - name: TLS_CERT_PATH
              value: "{{ .Values.tls.mountPath }}/tls.crt"
            - name: TLS_KEY_PATH
              value: "{{ .Values.tls.mountPath }}/tls.key"
            - name: PEER_TLS_VERIFY
              value: "{{ .Values.tls.peerVerify }}"
            - name: PEER_CA_PATH
              value: "{{ .Values.tls.mountPath }}/tls.crt"
            {{- end }}
          resources:
{{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: {{ .Values.hostPath.name }}
              mountPath: {{ .Values.hostPath.mountPath }}
            - name: audit-logs
              mountPath: {{ .Values.auditLogging.mountPath }}
            - name: auth-token
              mountPath: /etc/auth
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: {{ .Values.hostPath.name }}
          hostPath:
            path: {{ .Values.hostPath.path }}
            type: {{ .Values.hostPath.type }}
        - name: audit-logs
          emptyDir: {}
        - name: auth-token
          secret:
            secretName: {{ .Values.secret.name }}
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName | default (printf "%s-tls" .Values.daemonset.name) }}
        {{- end }}
{{- with .Values.podSecurity.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.podSecurity.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.podSecurity.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
---
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.daemonset.name }}-network-policy
  namespace: {{ .Values.daemonset.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- range $key, $value := .Values.daemonset.labels }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
  policyTypes:
    - Ingress
  ingress:
    - {{- if .Values.networkPolicy.ingressFromCidr }}
      from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.ingressFromCidr | quote }}
      {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.nodePort.targetPort }}
{{- end }}
---
{{- if .Values.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.daemonset.name }}-nodeport
  namespace: {{ .Values.daemonset.namespace }}
  labels:
    {{- range $key, $value := .Values.daemonset.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  type: NodePort
  externalTrafficPolicy: {{ .Values.nodePort.externalTrafficPolicy }}
  selector:
    {{- range $key, $value := .Values.daemonset.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  ports:
    - protocol: TCP
      port: {{ .Values.nodePort.port }}
      targetPort: {{ .Values.nodePort.targetPort }}
      nodePort: {{ .Values.nodePort.nodePort }}
{{- end }}
---
{{- if .Values.uiPlugin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.uiPlugin.name }}
  namespace: {{ .Values.uiPlugin.namespace }}
  labels:
    app: {{ .Values.uiPlugin.name }}
spec:
  replicas: {{ .Values.uiPlugin.replicas | default 1 }}
  # Zero-downtime rollout: never take the serving pod down before the
  # replacement is Ready (maxUnavailable: 0), and bring the new pod up
  # alongside the old one (maxSurge) so both run simultaneously during the
  # transition. The readiness probe below gates the cutover.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.uiPlugin.updateStrategy.maxUnavailable }}
      maxSurge: {{ .Values.uiPlugin.updateStrategy.maxSurge }}
  minReadySeconds: {{ .Values.uiPlugin.updateStrategy.minReadySeconds | default 0 }}
  selector:
    matchLabels:
      app: {{ .Values.uiPlugin.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.uiPlugin.name }}
    spec:
      containers:
        - name: ui
          image: "{{ .Values.uiPlugin.image.registry }}/{{ .Values.uiPlugin.image.repository }}:{{ .Values.uiPlugin.image.tag }}"
          imagePullPolicy: {{ .Values.uiPlugin.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /package.json
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
{{ toYaml .Values.uiPlugin.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.uiPlugin.name }}
  namespace: {{ .Values.uiPlugin.namespace }}
  labels:
    app: {{ .Values.uiPlugin.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.uiPlugin.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.uiPlugin.service.port }}
      targetPort: 8080
      name: http
---
{{- if .Values.uiPlugin.createUIPluginResource }}
apiVersion: catalog.cattle.io/v1
kind: UIPlugin
metadata:
  name: {{ .Values.uiPlugin.name }}
  namespace: {{ .Values.uiPlugin.namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace | quote }}
spec:
  plugin:
    name: {{ .Values.uiPlugin.name }}
    version: {{ .Values.uiPlugin.pluginVersion | quote }}
    endpoint: {{ .Values.uiPlugin.endpoint | quote }}
    noCache: {{ .Values.uiPlugin.noCache }}
{{- end }}
{{- end }}