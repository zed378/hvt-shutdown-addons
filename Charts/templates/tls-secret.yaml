{{- /*
  TLS certificate for the shutdown API.
  Rendered only when tls.enabled is true AND no external secret is supplied
  (tls.secretName empty). Generates a self-signed cert/key via Sprig.
  NOTE: helm upgrade regenerates this cert; peers do not verify certs by default
  (peerVerify: false), so rotation is non-disruptive. Provide tls.secretName to
  manage certs externally (e.g. cert-manager) and avoid regeneration.
*/ -}}
{{- if and .Values.tls.enabled (empty .Values.tls.secretName) }}
{{- $cn := .Values.tls.selfSigned.commonName }}
{{- $cert := genSelfSignedCert $cn nil (list $cn) (int .Values.tls.selfSigned.days) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.daemonset.name }}-tls
  namespace: {{ .Values.daemonset.namespace }}
  labels:
    {{- range $key, $value := .Values.daemonset.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
