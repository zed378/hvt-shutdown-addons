{{- /*
  Reject the well-known leaked default token that previously shipped with this
  chart. The value below is the PLAINTEXT token (matching how auth.token is
  supplied in values.yaml / addon.yaml), so this guard actually fires.
  Previously it compared against a base64 string that never matched the
  plaintext value, so the check was silently ineffective.
*/ -}}
{{- $leakedDefault := "pQLeDmkxhMpyaYUU3v143bVuZC9BgGczRKWjM8HiRt9rU1EZ3SzjZ063ZdiwYFap" -}}
{{- if eq .Values.auth.token $leakedDefault }}
{{- fail "SECURITY: auth.token is set to the known default/leaked value. Generate a new one (openssl rand -hex 32) and set it via values.yaml or the Harvester Add-on UI before installing." }}
{{- end }}
{{- /*
  If no token is provided, fail closed by generating a strong random token.
  The service will still require a valid Bearer token, but the operator must
  read it out of the Secret (or, preferably, set an explicit token via the UI).
*/ -}}
{{- $authToken := .Values.auth.token }}
{{- if empty .Values.auth.token }}
{{- $authToken = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.secret.namespace }}
  {{- if empty .Values.auth.token }}
  annotations:
    "note": "Auto-generated auth token. Set auth.token (via values.yaml or the Add-on UI) to use a known token."
  {{- end }}
type: {{ .Values.secret.type }}
data:
  {{ .Values.secret.key }}: {{ $authToken | b64enc }}
