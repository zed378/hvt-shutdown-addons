{{- if eq .Values.auth.token "cFFMZURta3hoTXB5YVlVVTN2MTQzYlZ1WkM5QmdHY3pSS1dqTThIaVJ0OXJVMUVaM1N6alowNjNaZGl3WUZhcA==" }}
{{- fail "Security Vulnerability: You must change the default auth.token in values.yaml before installing this chart!" }}
{{- end }}
{{- $authToken := .Values.auth.token }}
{{- if empty .Values.auth.token }}
{{- $authToken = randAlphaNum 64 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.secret.namespace }}
  {{- if empty .Values.auth.token }}
  annotations:
    "note": "Auto-generated auth token. Set auth.token in values.yaml to use a fixed token."
  {{- end }}
type: {{ .Values.secret.type }}
data:
  {{ .Values.secret.key }}: {{ $authToken | b64enc }}
