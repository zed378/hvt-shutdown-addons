auth:
  # IMPORTANT: Generate a strong, random token before deployment:
  #   openssl rand -hex 32
  # For Helm, the token is automatically base64 encoded via {{ .Values.auth.token | b64enc }}
  # WARNING: This token MUST be set before deployment. An empty token will cause 500 errors.
  # TODO: Replace with your own secure random token before deploying
  token: "cFFMZURta3hoTXB5YVlVVTN2MTQzYlZ1WkM5QmdHY3pSS1dqTThIaVJ0OXJVMUVaM1N6alowNjNaZGl3WUZhcA=="

image:
  registry: "zed378"
  repository: "hvt-shutdown"
  tag: "latest"
  pullPolicy: "IfNotPresent"

daemonset:
  name: "node-shutdown-webhook"
  namespace: "harvester-system"
  serviceAccount: "node-shutdown-sa"
  hostNetwork: true
  privileged: true
  hostIPC: false
  hostPID: false
  labels:
    app: "node-shutdown"
    version: "v1"

rbac:
  clusterRoleName: "node-shutdown-role"
  clusterRoleBindingName: "node-shutdown-binding"
  serviceAccountName: "node-shutdown-sa"
  serviceAccountNamespace: "harvester-system"
  # Only required permissions - least privilege
  apiGroups_kubevirt: ["kubevirt.io"]
  resources_kubevirt: ["virtualmachineinstances"]
  verbs_kubevirt: ["get", "list"]
  apiGroups_core: [""]
  resources_core: ["pods"]
  verbs_core: ["list", "delete"]

secret:
  name: "node-shutdown-auth"
  namespace: "harvester-system"
  type: "Opaque"
  key: "auth-token"

gracePeriodSeconds: 10
healthCheck:
  liveness:
    path: "/healthz"
    port: 8080
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: "/healthz/ready"
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

hostPath:
  name: "host-root"
  mountPath: "/host"
  path: "/"
  type: "Directory"

# Security hardening
podSecurity:
  # Pod security standards - restrict privileged access
  runAsNonRoot: false # Node shutdown requires root for systemctl
  readOnlyRootFilesystem: false # Need to write logs
  allowPrivilegeEscalation: false
  drop_capabilities:
    - ALL
  nodeSelector: {}
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/node
      operator: Exists
  affinity: {}

# Rate limiting
rateLimiting:
  enabled: true
  maxRequestsPerMinute: 10

# Audit logging
auditLogging:
  enabled: true
  path: "/var/log/shutdown-audit.log"

# Resource limits
resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Pod disruption budget (optional)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# NodePort service configuration
nodePort:
  enabled: true
  # Port to expose the service (default: 30088)
  port: 30088
  # Target port (container port)
  targetPort: 8080
  # Node port range (30000-32767)
  nodePort: 30088

# Max time to wait for VMs to fully shut down before baremetal poweroff (seconds)
vmShutdownTimeout: 120

# Network policy (optional - restricts incoming traffic)
networkPolicy:
  enabled: false
  # When enabled, only allows ingress on the health check port
  # For production, consider adding source CIDR restrictions
  ingressFromCidr: null # e.g., "10.0.0.0/8"
