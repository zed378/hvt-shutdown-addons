auth:
  # IMPORTANT: Set a strong, random token before deployment:
  #   openssl rand -hex 32
  # Provide it here, or (preferred) via the Harvester Add-on UI token field.
  # The chart base64-encodes this value into the Secret automatically.
  #
  # Fail-closed behavior: if left empty, the chart generates a strong random
  # token at install time (read it from the "node-shutdown-auth" Secret). The
  # service always requires a valid Bearer token. Do NOT commit a real token.
  token: ""

image:
  registry: "zed378"
  repository: "hvt-shutdown"
  tag: "latest"
  pullPolicy: "IfNotPresent"

daemonset:
  name: "node-shutdown-webhook"
  namespace: "harvester-system"
  serviceAccount: "node-shutdown-sa"
  hostNetwork: true
  privileged: true
  hostIPC: false
  hostPID: true
  terminationGracePeriodSeconds: 30
  labels:
    app: "node-shutdown"
    version: "v1"

rbac:
  clusterRoleName: "node-shutdown-role"
  clusterRoleBindingName: "node-shutdown-binding"
  serviceAccountName: "node-shutdown-sa"
  serviceAccountNamespace: "harvester-system"
  # RBAC rules for ClusterRole (least privilege).
  # The service only needs to: read VM instances (informational), and
  # list/get/delete pods (to enumerate peer pods and gracefully delete
  # virt-launcher pods on the node it is powering off).
  # Removed vs. earlier versions: delete on nodes/namespaces/events
  # (dangerous and unused), pods/status patch (unused), and uiplugins
  # write access (the UIPlugin CR is created by the Helm release, not the app).
  rules:
    # Stop VMs gracefully by patching the VirtualMachine (runStrategy=Halted /
    # running=false). This is what actually shuts a VM down — deleting the
    # virt-launcher pod alone makes KubeVirt restart it.
    - apiGroups: ["kubevirt.io"]
      resources: ["virtualmachines"]
      verbs: ["get", "list", "patch", "update"]
    # Read VMIs (to find which VMs run on this node) and delete standalone VMIs.
    - apiGroups: ["kubevirt.io"]
      resources: ["virtualmachineinstances"]
      verbs: ["get", "list", "watch", "delete"]
    # Enumerate peer pods and force-delete straggler virt-launcher pods.
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "delete"]

secret:
  name: "node-shutdown-auth"
  namespace: "harvester-system"
  type: "Opaque"
  key: "auth-token"

gracePeriodSeconds: 10
healthCheck:
  startup:
    path: "/healthz"
    port: 8080
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 30
    successThreshold: 1
  liveness:
    path: "/healthz"
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: "/healthz/ready"
    port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

hostPath:
  name: "host-root"
  mountPath: "/host"
  path: "/"
  type: "Directory"

# TLS for the shutdown API and peer-to-peer coordination calls.
# When enabled, the service serves HTTPS on the container port and all peer
# calls use HTTPS. Health probes automatically switch to the HTTPS scheme.
tls:
  enabled: false
  # Provide your own cert by setting an existing TLS secret name (keys tls.crt /
  # tls.key). Leave empty to have the chart generate a self-signed cert.
  secretName: ""
  # Where the cert/key are mounted inside the container.
  mountPath: "/etc/tls"
  # Validity (days) and CN for the chart-generated self-signed certificate.
  selfSigned:
    days: 3650
    commonName: "node-shutdown-webhook"
  # Verify peer certificates during cluster coordination. With self-signed
  # per-node certs this should stay false (the bearer token is the real control).
  peerVerify: false

# Security hardening
podSecurity:
  # Pod security standards - restrict privileged access
  runAsNonRoot: false # Node shutdown requires root for systemctl
  readOnlyRootFilesystem: false # Need to write logs
  allowPrivilegeEscalation: true # Required when privileged: true
  drop_capabilities:
    - ALL
  nodeSelector: {}
  tolerations:
    - operator: Exists
  affinity: {}

# Rate limiting
rateLimiting:
  enabled: true
  maxRequestsPerMinute: 10

# Audit logging
auditLogging:
  enabled: true
  path: "/var/log/shutdown-audit.log"
  mountPath: "/var/log"

# Resource limits
resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Pod disruption budget (optional)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# NodePort service configuration
nodePort:
  enabled: true
  # Port to expose the service (default: 30088)
  port: 30088
  # Target port (container port)
  targetPort: 8080
  # Node port range (30000-32767)
  nodePort: 30088
  # Routing policy (Local = traffic routed strictly to local node's pod)
  externalTrafficPolicy: Local

# Max time to wait for VMs to fully shut down before baremetal poweroff (seconds)
vmShutdownTimeout: 120

# Network policy (optional - restricts incoming traffic to the API port).
# IMPORTANT: this DaemonSet uses hostNetwork: true. Kubernetes NetworkPolicy
# generally does NOT apply to hostNetwork pods (traffic to the node IP bypasses
# the CNI), so the authoritative control for restricting NodePort access is a
# HOST FIREWALL rule on the node (e.g. allow 30088 only from your management
# subnet). The policy below is defense-in-depth for CNIs that do enforce it.
networkPolicy:
  enabled: false
  # When set, only allows ingress from this source CIDR on the API port.
  ingressFromCidr: null # e.g., "10.0.0.0/8"

# Rancher UIPlugin (installed by this Helm chart)
# The UI extension is a Rancher UI plugin (module-federation bundle) served from
# a separate in-cluster container image (nginx). Rancher/Harvester loads it from
# the internal ClusterIP service DNS endpoint below — NOT from GitHub Pages.
uiPlugin:
  enabled: true
  # When true, creates the UIPlugin CR so Rancher picks up the extension
  createUIPluginResource: true
  # UIPlugin metadata
  name: hvt-shutdown-ui
  namespace: cattle-ui-plugin-system

  # UI container image (separate from the API image, built by Dockerfile.ui)
  image:
    registry: "zed378"
    repository: "hvt-shutdown-ui"
    tag: "latest"
    pullPolicy: "IfNotPresent"

  # UIPlugin spec
  pluginName: hvt-shutdown-ui
  # Kept aligned with the chart version
  pluginVersion: "1.2.0"
  # Internal DNS endpoint of the in-cluster ClusterIP service that serves the
  # extension bundle. Format: <service>.<namespace>.svc:<port>
  endpoint: "http://hvt-shutdown-ui.cattle-ui-plugin-system.svc:80"

  # Rancher UIPlugin caching behavior
  noCache: false

  # ClusterIP service configuration
  service:
    port: 80

  # Number of replicas for the UI deployment
  replicas: 1

  # Rolling update strategy for zero-downtime UI transitions.
  # maxUnavailable: 0 keeps the serving pod up until the new one is Ready;
  # maxSurge: 1 starts the replacement alongside it (both run simultaneously).
  updateStrategy:
    maxUnavailable: 0
    maxSurge: 1
    # Optional: seconds a new pod must stay Ready before it's considered available.
    minReadySeconds: 0

  # Resource limits for the UI container
  resources:
    limits:
      cpu: "100m"
      memory: "64Mi"
    requests:
      cpu: "50m"
      memory: "32Mi"

# Standalone token console: a network-restricted, UNAUTHENTICATED web UI to set /
# rotate the shutdown auth token. Served from the API image as a separate,
# unprivileged Deployment (ServiceAccount scoped to write only the auth Secret)
# and exposed on its own NodePort. It does NOT depend on the Rancher extension
# framework, so it works on any Harvester.
#
# SECURITY: because it can change the credential that gates cluster shutdown with
# no authentication, you MUST restrict its NodePort to a trusted management
# network with a host firewall.
tokenConsole:
  enabled: true
  name: node-shutdown-console
  serviceAccountName: node-shutdown-console-sa
  replicas: 1
  # Tokens shorter than this trigger a weak-token warning in the UI.
  minTokenLength: 32
  # Reuses the API image (image.* above) — no separate image to build/push.
  nodePort:
    enabled: true
    port: 30089
    targetPort: 8080
    nodePort: 30089
    externalTrafficPolicy: Cluster
  resources:
    limits:
      cpu: "200m"
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
