apiVersion: harvesterhci.io/v1beta1
kind: Addon
metadata:
  name: node-shutdown
  namespace: harvester-system # Use harvester-system namespace for addons to show up in the Harvester UI
  labels:
    # Remove this label for production (marks as experimental in UI)
    # addon.harvesterhci.io/experimental: "true"
spec:
  # Set to true to automatically install
  enabled: false
  # Helm chart repository URL
  repo: "https://zed378.github.io/hvt-shutdown-addons/"
  # Chart version
  version: "1.5.0"
  # Chart name (must match chart.yaml name)
  chart: node-shutdown
  # Values to pass to the Helm chart - will be merged with chart's values.yaml
  # IMPORTANT: This only passes values, the chart itself must be in the repository
  valuesContent: |-
    auth:
      # IMPORTANT: Set a strong, random token before deployment:
      #   openssl rand -hex 32
      # Configure this directly via the Harvester Add-on UI (recommended), or set
      # it here. The chart base64-encodes this value into the Secret automatically.
      # Fail-closed: if left empty, a strong random token is generated at install
      # time (read it from the "node-shutdown-auth" Secret). Do NOT commit a real token.
      token: "cFFMZURta3hoTXB5YVlVVTN2MTQzYlZ1WkM5QmdHY3pSS1dqTThIaVJ0OXJVMUVaM1N6alowNjNaZGl3WUZhcA=="

    image:
      registry: "zed378"
      repository: "hvt-shutdown"
      tag: "latest"
      pullPolicy: "Always"

    daemonset:
      name: "node-shutdown-webhook"
      namespace: "harvester-system"
      serviceAccount: "node-shutdown-sa"
      hostNetwork: true
      privileged: true
      hostIPC: false
      hostPID: true
      terminationGracePeriodSeconds: 30
      labels:
        app: "node-shutdown"
        version: "v1"

    rbac:
      clusterRoleName: "node-shutdown-role"
      clusterRoleBindingName: "node-shutdown-binding"
      serviceAccountName: "node-shutdown-sa"
      serviceAccountNamespace: "harvester-system"
      # Stop VMs by patching VirtualMachines; read/delete VMIs; delete pods.
      rules:
        - apiGroups: ["kubevirt.io"]
          resources: ["virtualmachines"]
          verbs: ["get", "list", "patch", "update"]
        - apiGroups: ["kubevirt.io"]
          resources: ["virtualmachineinstances"]
          verbs: ["get", "list", "watch", "delete"]
        - apiGroups: ["kubevirt.io"]
          resources: ["virtualmachineinstancemigrations"]
          verbs: ["get", "list", "create"]
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list", "delete"]

    secret:
      name: "node-shutdown-auth"
      namespace: "harvester-system"
      type: "Opaque"
      key: "auth-token"

    gracePeriodSeconds: 10

    healthCheck:
      startup:
        path: "/healthz"
        port: 8080
        initialDelaySeconds: 0
        periodSeconds: 10
        failureThreshold: 30
        successThreshold: 1
      liveness:
        path: "/healthz"
        port: 8080
        initialDelaySeconds: 60
        periodSeconds: 20
        timeoutSeconds: 5
        failureThreshold: 3
      readiness:
        path: "/healthz/ready"
        port: 8080
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3

    hostPath:
      name: "host-root"
      mountPath: "/host"
      path: "/"
      type: "Directory"

    # TLS for the shutdown API and peer-to-peer coordination calls.
    tls:
      enabled: false
      secretName: ""
      mountPath: "/etc/tls"
      selfSigned:
        days: 3650
        commonName: "node-shutdown-webhook"
      peerVerify: false

    # Security hardening
    podSecurity:
      runAsNonRoot: false
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: true
      drop_capabilities:
        - ALL
      nodeSelector: {}
      tolerations:
        - operator: Exists
      affinity: {}

    # Rate limiting
    rateLimiting:
      enabled: true
      maxRequestsPerMinute: 10

    # Audit logging
    auditLogging:
      enabled: true
      path: "/var/log/shutdown-audit.log"
      mountPath: "/var/log"

    # Resource limits
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

    # Pod disruption budget (optional)
    podDisruptionBudget:
      enabled: false
      minAvailable: 1

    # NodePort service configuration
    nodePort:
      enabled: true
      port: 30088
      targetPort: 8080
      nodePort: 30088
      externalTrafficPolicy: Local

    # Max time to wait for VMs to fully shut down before baremetal poweroff (seconds)
    vmShutdownTimeout: 120

    # Scheduled shutdown (set from the dashboard Node Shutdown page). nodes empty =
    # whole cluster; vmStrategy = migrate | stop | force.
    schedule:
      enabled: false
      cron: "0 2 * * *"
      nodes: []
      vmStrategy: "migrate"

    # Network policy (optional). NOTE: hostNetwork pods largely bypass
    # NetworkPolicy — use a host firewall on the node to restrict NodePort 30088.
    networkPolicy:
      enabled: false
      ingressFromCidr: null # e.g. "10.0.0.0/8"

    # Standalone token console (network-restricted, UNAUTHENTICATED). Sets/rotates
    # the shutdown auth token from a simple web page on its own NodePort, without
    # needing the Rancher extension framework. RESTRICT NodePort 30089 to a
    # trusted management network with a host firewall.
    tokenConsole:
      enabled: true
      name: node-shutdown-console
      serviceAccountName: node-shutdown-console-sa
      replicas: 1
      minTokenLength: 32
      nodePort:
        enabled: true
        port: 30089
        targetPort: 8080
        nodePort: 30089
        externalTrafficPolicy: Cluster
      resources:
        limits:
          cpu: "200m"
          memory: "128Mi"
        requests:
          cpu: "50m"
          memory: "64Mi"
