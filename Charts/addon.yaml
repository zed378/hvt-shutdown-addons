apiVersion: harvesterhci.io/v1beta1
kind: Addon
metadata:
  name: node-shutdown
  namespace: harvester-local-storage # Use harvester-local-storage for local addons or harvester-system for global
  labels:
    # Remove this label for production (marks as experimental in UI)
    # Add-on.harvesterhci.io/experimental: "true"
spec:
  # Set to true to automatically install
  enabled: false
  # Helm chart repository URL
  repo: "https://charts.harvester-system.svc"
  # Chart version
  version: "1.0.0"
  # Chart name (must match chart.yaml name)
  chart: node-shutdown
  # Values to pass to the Helm chart - will be merged with chart's values.yaml
  # IMPORTANT: This only passes values, the chart itself must be in the repository
  valuesContent: |-
    auth:
      token: "CHANGE-ME-GENERATE-WITH-openssl-rand-hex-32"

    image:
      registry: "your-registry"
      repository: "node-shutdown-api"
      tag: "latest"
      pullPolicy: "IfNotPresent"

    daemonset:
      name: "node-shutdown-webhook"
      namespace: "harvester-system"
      serviceAccount: "node-shutdown-sa"
      hostNetwork: true
      privileged: true
      hostIPC: false
      hostPID: false
      labels:
        app: "node-shutdown"
        version: "v1"

    rbac:
      clusterRoleName: "node-shutdown-role"
      clusterRoleBindingName: "node-shutdown-binding"
      serviceAccountName: "node-shutdown-sa"
      serviceAccountNamespace: "harvester-system"
      apiGroups_kubevirt: ["kubevirt.io"]
      resources_kubevirt: ["virtualmachineinstances"]
      verbs_kubevirt: ["get", "list"]
      apiGroups_core: [""]
      resources_core: ["pods"]
      verbs_core: ["list", "delete"]

    secret:
      name: "node-shutdown-auth"
      namespace: "harvester-system"
      type: "Opaque"
      key: "auth-token"

    gracePeriodSeconds: 10
    healthCheck:
      liveness:
        path: "/healthz"
        port: 8080
        initialDelaySeconds: 15
        periodSeconds: 20
      readiness:
        path: "/healthz/ready"
        port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10

    hostPath:
      name: "host-root"
      mountPath: "/host"
      path: "/"
      type: "Directory"

    podSecurity:
      runAsNonRoot: false
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      drop_capabilities:
        - ALL
      nodeSelector: {}
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/node
          operator: Exists
      affinity: {}

    rateLimiting:
      enabled: true
      maxRequestsPerMinute: 10

    auditLogging:
      enabled: true
      path: "/var/log/shutdown-audit.log"

    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
