apiVersion: harvesterhci.io/v1beta1
kind: Addon
metadata:
  name: node-shutdown
  namespace: harvester-system # Use harvester-system namespace for addons to show up in the Harvester UI
  labels:
    # Remove this label for production (marks as experimental in UI)
    # addon.harvesterhci.io/experimental: "true"
spec:
  # Set to true to automatically install
  enabled: false
  # Helm chart repository URL
  repo: "https://zed378.github.io/hvt-shutdown-addons/"
  # Chart version
  version: "1.1.0"
  # Chart name (must match chart.yaml name)
  chart: node-shutdown
  # Values to pass to the Helm chart - will be merged with chart's values.yaml
  # IMPORTANT: This only passes values, the chart itself must be in the repository
  valuesContent: |-
    auth:
      # IMPORTANT: Generate a strong, random token before deployment:
      #   openssl rand -hex 32
      # For Helm, the token is automatically base64 encoded via {{ .Values.auth.token | b64enc }}
      # WARNING: This token MUST be set before deployment. An empty token will cause 500 errors.
      # You can now configure this directly via the Harvester Add-on UI.
      token: "pQLeDmkxhMpyaYUU3v143bVuZC9BgGczRKWjM8HiRt9rU1EZ3SzjZ063ZdiwYFap"

    image:
      registry: "zed378"
      repository: "hvt-shutdown"
      tag: "latest"
      pullPolicy: "Always"

    daemonset:
      name: "node-shutdown-webhook"
      namespace: "harvester-system"
      serviceAccount: "node-shutdown-sa"
      hostNetwork: true
      privileged: true
      hostIPC: false
      hostPID: true
      terminationGracePeriodSeconds: 30
      labels:
        app: "node-shutdown"
        version: "v1"

    rbac:
      clusterRoleName: "node-shutdown-role"
      clusterRoleBindingName: "node-shutdown-binding"
      serviceAccountName: "node-shutdown-sa"
      serviceAccountNamespace: "harvester-system"
      rules:
        - apiGroups: ["kubevirt.io"]
          resources: ["virtualmachineinstances"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods", "nodes", "events", "namespaces"]
          verbs: ["list", "delete", "get", "watch"]
        - apiGroups: [""]
          resources: ["pods/status"]
          verbs: ["patch", "get"]
        - apiGroups: ["catalog.cattle.io"]
          resources: ["uiplugins"]
          verbs: ["get", "list", "create", "update", "patch"]

    healthCheck:
      startup:
        path: "/healthz"
        port: 8080
        initialDelaySeconds: 0
        periodSeconds: 10
        failureThreshold: 30
        successThreshold: 1
      liveness:
        path: "/healthz"
        port: 8080
        initialDelaySeconds: 60
        periodSeconds: 20
        timeoutSeconds: 5
        failureThreshold: 3
      readiness:
        path: "/healthz/ready"
        port: 8080
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3

    secret:
      name: "node-shutdown-auth"
      namespace: "harvester-system"
      type: "Opaque"
      key: "auth-token"


    hostPath:
      name: "host-root"
      mountPath: "/host"
      path: "/"
      type: "Directory"

    # Security hardening
    podSecurity:
      # Pod security standards - restrict privileged access
      runAsNonRoot: false # Node shutdown requires root for systemctl
      readOnlyRootFilesystem: false # Need to write logs
      allowPrivilegeEscalation: true # Required when privileged: true
      drop_capabilities:
        - ALL
      nodeSelector: {}
      tolerations:
        - operator: Exists
      affinity: {}

    # Rate limiting
    rateLimiting:
      enabled: true
      maxRequestsPerMinute: 10

    # Audit logging
    auditLogging:
      enabled: true
      path: "/var/log/shutdown-audit.log"
      mountPath: "/var/log"

    # Resource limits
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

    # Pod disruption budget (optional)
    podDisruptionBudget:
      enabled: false
      minAvailable: 1

    # NodePort service configuration
    nodePort:
      enabled: true
      # Port to expose the service (default: 30088)
      port: 30088
      # Target port (container port)
      targetPort: 8080
      # Node port range (30000-32767)
      nodePort: 30088
      # Routing policy (Local = traffic routed strictly to local node's pod)
      externalTrafficPolicy: Local

    # Max time to wait for VMs to fully shut down before baremetal poweroff (seconds)
    vmShutdownTimeout: 120

    # Network policy (optional - restricts incoming traffic)
    networkPolicy:
      enabled: false
      # When enabled, only allows ingress on the health check port
      # For production, consider adding source CIDR restrictions
      ingressFromCidr: null # e.g., "10.0.0.0/8"

    # Rancher UIPlugin configuration
    # UI static files are published to GitHub Pages and served at:
    # https://zed378.github.io/hvt-shutdown-addons
    uiPlugin:
      enabled: true
      createUIPluginResource: true
      name: hvt-shutdown-ui
      namespace: cattle-ui-plugin-system
      pluginName: hvt-shutdown-ui
      pluginVersion: "1.1.0"
      # UI plugin endpoint - served via GitHub Pages (publish_ui_to_pages.sh must run first)
      endpoint: "https://zed378.github.io/hvt-shutdown-addons"
      noCache: false
