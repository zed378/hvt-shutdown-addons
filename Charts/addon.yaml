apiVersion: harvesterhci.io/v1beta1
kind: Addon
metadata:
  name: node-shutdown
  namespace: harvester-system # Use harvester-system namespace for addons to show up in the Harvester UI
  labels:
    # Remove this label for production (marks as experimental in UI)
    # addon.harvesterhci.io/experimental: "true"
spec:
  # Set to true to automatically install
  enabled: false
  # Helm chart repository URL
  repo: "https://zed378.github.io/hvt-shutdown-addons/"
  # Chart version
  version: "1.2.1"
  # Chart name (must match chart.yaml name)
  chart: node-shutdown
  # Values to pass to the Helm chart - will be merged with chart's values.yaml
  # IMPORTANT: This only passes values, the chart itself must be in the repository
  valuesContent: |-
    auth:
      # IMPORTANT: Set a strong, random token before deployment:
      #   openssl rand -hex 32
      # Configure this directly via the Harvester Add-on UI (recommended), or set
      # it here. The chart base64-encodes this value into the Secret automatically.
      # Fail-closed: if left empty, a strong random token is generated at install
      # time (read it from the "node-shutdown-auth" Secret). Do NOT commit a real token.
      token: "token123"

    image:
      registry: "zed378"
      repository: "hvt-shutdown"
      tag: "latest"
      pullPolicy: "Always"

    daemonset:
      name: "node-shutdown-webhook"
      namespace: "harvester-system"
      serviceAccount: "node-shutdown-sa"
      hostNetwork: true
      privileged: true
      hostIPC: false
      hostPID: true
      terminationGracePeriodSeconds: 30
      labels:
        app: "node-shutdown"
        version: "v1"

    rbac:
      clusterRoleName: "node-shutdown-role"
      clusterRoleBindingName: "node-shutdown-binding"
      serviceAccountName: "node-shutdown-sa"
      serviceAccountNamespace: "harvester-system"
      # Least-privilege: only read VMIs and list/get/delete pods.
      rules:
        - apiGroups: ["kubevirt.io"]
          resources: ["virtualmachineinstances"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list", "delete"]

    secret:
      name: "node-shutdown-auth"
      namespace: "harvester-system"
      type: "Opaque"
      key: "auth-token"

    gracePeriodSeconds: 10

    healthCheck:
      startup:
        path: "/healthz"
        port: 8080
        initialDelaySeconds: 0
        periodSeconds: 10
        failureThreshold: 30
        successThreshold: 1
      liveness:
        path: "/healthz"
        port: 8080
        initialDelaySeconds: 60
        periodSeconds: 20
        timeoutSeconds: 5
        failureThreshold: 3
      readiness:
        path: "/healthz/ready"
        port: 8080
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3

    hostPath:
      name: "host-root"
      mountPath: "/host"
      path: "/"
      type: "Directory"

    # TLS for the shutdown API and peer-to-peer coordination calls.
    tls:
      enabled: false
      secretName: ""
      mountPath: "/etc/tls"
      selfSigned:
        days: 3650
        commonName: "node-shutdown-webhook"
      peerVerify: false

    # Security hardening
    podSecurity:
      runAsNonRoot: false
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: true
      drop_capabilities:
        - ALL
      nodeSelector: {}
      tolerations:
        - operator: Exists
      affinity: {}

    # Rate limiting
    rateLimiting:
      enabled: true
      maxRequestsPerMinute: 10

    # Audit logging
    auditLogging:
      enabled: true
      path: "/var/log/shutdown-audit.log"
      mountPath: "/var/log"

    # Resource limits
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

    # Pod disruption budget (optional)
    podDisruptionBudget:
      enabled: false
      minAvailable: 1

    # NodePort service configuration
    nodePort:
      enabled: true
      port: 30088
      targetPort: 8080
      nodePort: 30088
      externalTrafficPolicy: Local

    # Max time to wait for VMs to fully shut down before baremetal poweroff (seconds)
    vmShutdownTimeout: 120

    # Network policy (optional). NOTE: hostNetwork pods largely bypass
    # NetworkPolicy — use a host firewall on the node to restrict NodePort 30088.
    networkPolicy:
      enabled: false
      ingressFromCidr: null # e.g. "10.0.0.0/8"

    # Rancher UIPlugin configuration.
    # The UI extension is served from a separate in-cluster container image and
    # loaded by Rancher/Harvester via the internal ClusterIP service DNS endpoint
    # below (NOT GitHub Pages).
    uiPlugin:
      enabled: true
      createUIPluginResource: true
      name: hvt-shutdown-ui
      namespace: cattle-ui-plugin-system
      image:
        registry: "zed378"
        repository: "hvt-shutdown-ui"
        tag: "latest"
        pullPolicy: "Always"
      pluginName: hvt-shutdown-ui
      pluginVersion: "1.2.0"
      endpoint: "http://hvt-shutdown-ui.cattle-ui-plugin-system.svc:80"
      noCache: false
      service:
        port: 80
      replicas: 1
      # Zero-downtime rolling update: keep the old pod serving until the new
      # one is Ready (maxUnavailable: 0) and surge the new pod alongside it.
      updateStrategy:
        maxUnavailable: 0
        maxSurge: 1
        minReadySeconds: 0
      resources:
        limits:
          cpu: "100m"
          memory: "64Mi"
        requests:
          cpu: "50m"
          memory: "32Mi"
